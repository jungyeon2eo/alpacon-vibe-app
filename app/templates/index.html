<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🦙 Alpaca Meadow</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,Inter,"Segoe UI",Roboto,sans-serif;color:#31513a;user-select:none}
    body{background:#0a0f2e;cursor:pointer}
    #scene{position:fixed;inset:0}

    /* day/night cycle — all layers share a 90s timeline */
    .sky{position:absolute;inset:0}
    .sky.day{background:linear-gradient(#bfe3ff 0%,#d9f0ff 40%,#eafbe6 70%,#eafbe6 100%);animation:dayFade 70s linear infinite}
    .sky.night{background:linear-gradient(#0a0f2e 0%,#172a55 60%,#33567f 100%);opacity:0;animation:nightFade 70s linear infinite}
    .stars{position:absolute;left:0;right:0;top:0;height:62%;opacity:0;animation:starFade 70s linear infinite;pointer-events:none}
    .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 4px 1px rgba(255,255,255,.8)}
    .moon{position:absolute;top:8%;right:16%;width:64px;height:64px;border-radius:50%;
      background:radial-gradient(circle at 38% 36%,#fffef4,#e2e6f2);box-shadow:0 0 34px 10px rgba(226,230,255,.45);opacity:0;animation:moonFade 70s linear infinite}
    .moon::after{content:"";position:absolute;top:15px;left:13px;width:11px;height:11px;border-radius:50%;background:rgba(178,184,208,.45);box-shadow:23px 12px 0 -2px rgba(178,184,208,.35),10px 30px 0 -4px rgba(178,184,208,.3)}
    .veil{position:absolute;inset:0;background:#0a1030;opacity:0;animation:veilFade 70s linear infinite;pointer-events:none}
    @keyframes dayFade{0%,38%{opacity:1}50%{opacity:0}82%{opacity:0}96%,100%{opacity:1}}
    @keyframes nightFade{0%,38%{opacity:0}52%{opacity:1}80%{opacity:1}94%,100%{opacity:0}}
    @keyframes starFade{0%,42%{opacity:0}56%{opacity:.9}80%{opacity:.9}92%,100%{opacity:0}}
    @keyframes veilFade{0%,40%{opacity:0}55%{opacity:.4}80%{opacity:.4}94%,100%{opacity:0}}
    @keyframes sunCycle{0%,34%{opacity:1;transform:translateY(0)}46%{opacity:0;transform:translateY(26px)}88%{opacity:0;transform:translateY(26px)}98%,100%{opacity:1;transform:translateY(0)}}
    @keyframes moonFade{0%,40%{opacity:0;transform:translateY(26px)}54%{opacity:1;transform:translateY(0)}80%{opacity:1;transform:translateY(0)}92%,100%{opacity:0;transform:translateY(26px)}}

    .sun{position:absolute;top:7%;left:12%;width:82px;height:82px;border-radius:50%;
      background:radial-gradient(circle,#fff7c9,#ffe27a);box-shadow:0 0 60px 18px rgba(255,226,122,.5);animation:sunCycle 70s linear infinite}
    .cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9}
    .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%}
    .cloud::before{width:55%;height:180%;top:-55%;left:12%}.cloud::after{width:45%;height:150%;top:-40%;right:14%}
    .c1{top:13%;width:120px;height:34px;animation:drift 48s linear infinite}
    .c2{top:24%;width:80px;height:24px;animation:drift 66s linear infinite;animation-delay:-20s;opacity:.8}
    .c3{top:8%;width:150px;height:40px;animation:drift 84s linear infinite;animation-delay:-40s;opacity:.75}
    @keyframes drift{from{left:-20%}to{left:120%}}

    /* parallax strips — duplicated content + translateX(-50%) = seamless loop */
    .layer{position:absolute;left:0;white-space:nowrap;will-change:transform}
    .layer span{display:inline-block}
    .far-trees{bottom:34%;animation:slide 40s linear infinite;filter:brightness(.92) saturate(.8);opacity:.85}
    .far-trees span{font-size:44px;margin-right:26px}
    .near-trees{bottom:20%;animation:slide 17s linear infinite}
    .near-trees span{font-size:76px;margin-right:34px;filter:drop-shadow(0 6px 4px rgba(0,60,20,.12))}
    .flowers{bottom:14%;animation:slide 11s linear infinite}
    .flowers span{font-size:19px;margin-right:44px;opacity:.9}
    @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    .hill{position:absolute;left:-5%;width:110%;border-radius:50% 50% 0 0}
    .hill.far{bottom:30%;height:20%;background:#a7d8a0}
    .hill.near{bottom:22%;height:18%;background:#7cc47a}

    /* river */
    .river{position:absolute;left:-2%;width:104%;bottom:30%;height:8%;
      background:linear-gradient(#bfe9ff,#7cc7f2);border-radius:40% 40% 0 0/70%;opacity:.92;
      box-shadow:inset 0 3px 6px rgba(255,255,255,.6)}
    .river::after{content:"";position:absolute;inset:0;border-radius:inherit;
      background:repeating-linear-gradient(100deg,transparent 0 40px,rgba(255,255,255,.35) 40px 46px);
      animation:flow 6s linear infinite;opacity:.5}
    @keyframes flow{from{background-position:0 0}to{background-position:120px 0}}

    /* ground — brown gravel so the green grazing tufts stand out */
    .ground{position:absolute;left:0;right:0;bottom:0;height:24%;background:linear-gradient(#b89a6f,#8a6d47)}
    .ground .gravel{position:absolute;inset:0;
      background-image:
        radial-gradient(circle at 12px 9px,rgba(255,255,255,.16) 2px,transparent 3px),
        radial-gradient(circle at 34px 22px,rgba(0,0,0,.14) 2.4px,transparent 3px),
        radial-gradient(circle at 56px 12px,rgba(255,255,255,.12) 1.6px,transparent 3px),
        radial-gradient(circle at 74px 27px,rgba(0,0,0,.12) 2px,transparent 3px);
      background-size:88px 36px;animation:scroll 1.1s linear infinite}
    @keyframes scroll{from{background-position:0 0}to{background-position:-88px 0}}

    .pollen{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.85);bottom:22%;animation:float 9s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-40px);opacity:.95}}

    /* ambient background alpacas — perspective via size/height/speed */
    .deco{position:absolute;transform:scaleX(-1);pointer-events:none;line-height:1;animation:amble linear infinite}
    @keyframes amble{from{left:108%}to{left:-12%}}

    /* alpaca — wrapper flips it to face right; svg does the trot bob */
    #alpacaWrap{position:absolute;left:calc(58% - 392px);bottom:21%;width:196px;transform:scaleX(-1)}
    #alpaca{width:100%;animation:trot .82s ease-in-out infinite}
    @keyframes trot{0%,100%{transform:translateY(0)}25%{transform:translateY(-5px)}50%{transform:translateY(0)}75%{transform:translateY(-5px)}}
    #alpaca .leg{transform-box:fill-box;transform-origin:50% 0}
    #legFL,#legBR{animation:swingA .82s ease-in-out infinite}
    #legFR,#legBL{animation:swingB .82s ease-in-out infinite}
    @keyframes swingA{0%,100%{transform:rotate(17deg)}50%{transform:rotate(-17deg)}}
    @keyframes swingB{0%,100%{transform:rotate(-17deg)}50%{transform:rotate(17deg)}}
    #headgroup{transform-origin:74px 96px;transition:transform .28s cubic-bezier(.34,1.4,.5,1)}
    #alpacaWrap.eat #headgroup{transform:translateY(10px) rotate(-44deg)}

    /* green grazing tufts (distinct from the brown ground) */
    .tuft{position:absolute;bottom:19%;font-size:30px;transition:transform .2s,opacity .2s;filter:drop-shadow(0 2px 1px rgba(0,60,20,.25))}
    .tuft.eaten{transform:translateY(8px) scale(.2);opacity:0}
    .nom{position:absolute;font-size:18px;font-weight:800;color:#3a7a45;pointer-events:none;z-index:6;animation:nom .7s ease forwards}
    @keyframes nom{0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(-34px) scale(1.1)}}

    /* tagline */
    #tagline{position:absolute;top:16px;left:18px;z-index:5;pointer-events:none;line-height:1.15}
    #tagline b{display:block;font-size:30px;color:#2c4a35;text-shadow:0 1px 3px rgba(255,255,255,.5);animation:tagCol 70s linear infinite}
    #tagline small{font-size:16px;font-weight:600;color:#2c4a35;opacity:.7;animation:tagCol 70s linear infinite}
    @keyframes tagCol{0%,40%{color:#2c4a35}55%{color:#eaf4ff}80%{color:#eaf4ff}94%,100%{color:#2c4a35}}

    /* HUD + shelf */
    #hud{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:5;flex-wrap:wrap;justify-content:center;max-width:70%}
    .stat{background:rgba(255,255,255,.74);backdrop-filter:blur(6px);border-radius:999px;padding:7px 15px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(49,81,58,.14);white-space:nowrap}
    .stat small{font-weight:600;opacity:.6}
    #who{position:absolute;top:14px;right:14px;z-index:5;background:rgba(255,255,255,.74);backdrop-filter:blur(6px);border:0;border-radius:999px;padding:7px 13px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 14px rgba(49,81,58,.14)}
    #shelf{position:absolute;left:14px;right:14px;bottom:12px;z-index:5;background:rgba(255,255,255,.74);backdrop-filter:blur(6px);border-radius:16px;padding:9px 12px;box-shadow:0 6px 20px rgba(49,81,58,.16)}
    #shelf .title{font-size:12px;font-weight:700;opacity:.65;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    #plants{display:flex;flex-wrap:wrap;gap:6px;max-height:66px;overflow:auto}
    #plants span{font-size:22px;animation:pop .4s ease}
    #plants .empty{font-size:13px;font-weight:600;opacity:.5}
    @keyframes pop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1);opacity:1}}
    #hint{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);z-index:5;font-size:13px;font-weight:600;color:#2c4a35;opacity:.75;background:rgba(255,255,255,.55);padding:6px 12px;border-radius:999px}

    /* background ghost alpacas of other wanderers */
    #ghosts{position:absolute;left:0;right:0;bottom:20%;height:0}
    .ghost{position:absolute;bottom:0;transform:translateX(-50%);text-align:center;opacity:.42;filter:grayscale(.25);transition:left 2.6s linear}
    .ghost .g-alpaca{display:block;font-size:52px;line-height:1;transform:scaleX(-1)}
    .ghost .tag{display:inline-block;background:rgba(255,255,255,.72);border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;color:#31513a;white-space:nowrap;margin-bottom:2px}

    /* gentle "others wandering" board */
    #board{position:absolute;top:52px;right:14px;z-index:5;background:rgba(255,255,255,.62);backdrop-filter:blur(6px);border-radius:14px;padding:8px 12px;width:172px;box-shadow:0 4px 14px rgba(49,81,58,.14);font-size:12px}
    #board .title{font-weight:700;opacity:.6;margin-bottom:5px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}
    #board .row{display:flex;justify-content:space-between;gap:10px;padding:1.5px 0}
    #board .row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #board .row b{font-weight:700;opacity:.75}
    #boardrows{max-height:230px;overflow:auto}

    /* checkpoints (bookmark spots, return anytime) */
    #cp{position:absolute;top:96px;left:14px;z-index:5;background:rgba(255,255,255,.62);backdrop-filter:blur(6px);border-radius:14px;padding:8px 10px;width:184px;box-shadow:0 4px 14px rgba(49,81,58,.14);font-size:12px}
    #cp .title{font-weight:700;opacity:.6;margin-bottom:6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}
    #cp .btns{display:flex;gap:6px;margin-bottom:6px}
    #cp .btns button{flex:1;border:0;border-radius:8px;padding:6px 8px;font-weight:700;font-size:12px;cursor:pointer;background:#eaf3e6;color:#31513a}
    #cp .btns button:active{transform:translateY(1px)}
    #cp .list{max-height:150px;overflow:auto}
    #cp .list .row{display:flex;align-items:center;gap:6px;padding:2px 0}
    #cp .list .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
    #cp .list .go{border:0;border-radius:7px;padding:3px 8px;background:#5bb45a;color:#fff;font-weight:700;cursor:pointer;font-size:11px}
    #cp .list .del{border:0;background:transparent;color:#c0607a;opacity:.65;cursor:pointer;font-size:13px;padding:0 2px}
    #cp .empty{opacity:.5}

    #login{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:linear-gradient(rgba(191,227,255,.55),rgba(234,251,230,.55));backdrop-filter:blur(4px)}
    #login .card{background:rgba(255,255,255,.92);border-radius:22px;padding:26px 24px;width:min(340px,90vw);box-shadow:0 18px 50px rgba(49,81,58,.28);text-align:center}
    #login h1{margin:0 0 2px;font-size:24px}#login p{margin:0 0 16px;font-size:13px;opacity:.65}
    #login input{width:100%;padding:12px 14px;margin:6px 0;border:1.5px solid #cfe3d2;border-radius:12px;font-size:16px;text-align:center}
    #login input:focus{outline:none;border-color:#5bb45a}
    #login button{width:100%;margin-top:10px;padding:12px;border:0;border-radius:12px;background:#5bb45a;color:#fff;font-weight:800;font-size:16px;cursor:pointer}
    #loginerr{color:#d9534f;font-size:13px;font-weight:600;min-height:18px;margin-top:8px}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <div id="scene">
    <div class="sky day"></div>
    <div class="sky night"></div>
    <div class="stars" id="stars"></div>
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="layer far-trees" id="farTrees"></div>
    <div class="hill far"></div>
    <div class="river"></div>
    <div class="hill near"></div>
    <div class="layer near-trees" id="nearTrees"></div>
    <div class="ground"><div class="gravel"></div></div>
    <div class="layer flowers" id="flowers"></div>

    <!-- ambient alpacas grazing on the green hills, above the tree line, solid -->
    <div id="deco">
      <span class="deco" style="bottom:46%;font-size:28px;animation-duration:88s;animation-delay:-8s">🦙</span>
      <span class="deco" style="bottom:44%;font-size:35px;animation-duration:74s;animation-delay:-42s">🦙</span>
      <span class="deco" style="bottom:43%;font-size:43px;animation-duration:60s;animation-delay:-20s">🦙</span>
      <span class="deco" style="bottom:42%;font-size:52px;animation-duration:52s;animation-delay:-64s">🦙</span>
      <span class="deco" style="bottom:41%;font-size:60px;animation-duration:44s;animation-delay:-30s">🦙</span>
    </div>

    <div id="ghosts"></div>

    <!-- grazing plants: just in front of the (right-facing) alpaca -->
    <div class="tuft" style="left:calc(58% - 150px)">🌿</div>
    <div class="tuft" style="left:calc(58% - 118px);font-size:26px">🌱</div>
    <div class="tuft" style="left:calc(58% - 86px);font-size:24px">🍀</div>

    <div id="alpacaWrap">
      <svg id="alpaca" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect id="legBL" class="leg" x="118" y="150" width="12" height="40" rx="6" fill="#e7dcc9"/>
        <rect id="legFL" class="leg" x="70" y="150" width="12" height="40" rx="6" fill="#e7dcc9"/>
        <rect id="legBR" class="leg" x="138" y="150" width="12" height="40" rx="6" fill="#efe6d6"/>
        <rect id="legFR" class="leg" x="92" y="150" width="12" height="40" rx="6" fill="#efe6d6"/>
        <ellipse cx="108" cy="132" rx="60" ry="40" fill="#f6efe0"/>
        <ellipse cx="108" cy="120" rx="58" ry="30" fill="#fffaf0"/>
        <circle cx="164" cy="126" r="14" fill="#f6efe0"/>
        <g id="headgroup">
          <rect x="64" y="70" width="26" height="66" rx="13" fill="#f6efe0"/>
          <ellipse cx="74" cy="66" rx="24" ry="22" fill="#fffaf0"/>
          <path d="M60 52 L56 30 L72 46 Z" fill="#f6efe0"/>
          <path d="M88 52 L94 30 L76 46 Z" fill="#f6efe0"/>
          <circle cx="66" cy="64" r="3.4" fill="#4a3d33"/>
          <ellipse cx="80" cy="74" rx="12" ry="9" fill="#efe0cc"/>
          <circle cx="82" cy="72" r="1.8" fill="#8a7a68"/><circle cx="86" cy="76" r="1.8" fill="#8a7a68"/>
        </g>
      </svg>
    </div>

    <div class="veil"></div>

    <div id="tagline"><b>enjoy the peace</b><small>no thinking required 🌿</small></div>
    <button id="who" class="hidden">🦙 <span id="pid"></span> · switch</button>
    <div id="board" class="hidden"><div class="title">others wandering 🦙</div><div id="boardrows"></div></div>
    <div id="cp" class="hidden">
      <div class="title">📍 checkpoints</div>
      <div class="btns"><button id="cpAdd">📍 save here</button><button id="cpStart">⏮ start</button></div>
      <div class="list" id="cpList"></div>
    </div>
    <div id="hud" class="hidden">
      <div class="stat">🌾 <span id="grass">0</span> <small>grass</small></div>
      <div class="stat">📏 <span id="dist">0</span> <small>m</small></div>
      <div class="stat">🪴 <span id="pcount">0</span> <small>plants</small></div>
    </div>
    <div id="hint" class="hidden">Space / Click to graze 🌿</div>
    <div id="shelf" class="hidden">
      <div class="title">🌸 collected plants</div>
      <div id="plants"><span class="empty">graze to grow your garden…</span></div>
    </div>
  </div>

  <div id="login">
    <div class="card">
      <h1>🦙 Alpaca Meadow</h1>
      <p>New ID → a fresh meadow.<br>Same ID + PIN → continue where you left off.</p>
      <input id="in-id" placeholder="your ID (a–z, 0–9)" autocomplete="off" maxlength="20">
      <input id="in-pin" placeholder="PIN (4–6 digits)" type="password" inputmode="numeric" maxlength="6">
      <button id="go">Start / Continue 🌿</button>
      <div id="loginerr"></div>
    </div>
  </div>

  <script>
    const $=s=>document.querySelector(s);
    // seamless strips: two identical halves, no explicit width (content decides it)
    function strip(el,set,n){let h='';for(let k=0;k<2;k++)for(let i=0;i<n;i++)h+='<span>'+set[i%set.length]+'</span>';el.innerHTML=h;}
    strip($('#farTrees'),['🌲','🌳','🌴'],18);
    strip($('#nearTrees'),['🌳','🌲'],14);
    strip($('#flowers'),['🌱','🌿','☘️','🍀','🌾'],20);
    for(let i=0;i<9;i++){const p=document.createElement('div');p.className='pollen';p.style.left=(10+Math.random()*80)+'%';p.style.animationDelay=(-Math.random()*9)+'s';$('#scene').appendChild(p);}
    {let h='';for(let i=0;i<64;i++){h+='<div class="star" style="left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*100).toFixed(1)+'%;opacity:'+(0.4+Math.random()*0.6).toFixed(2)+'"></div>';}$('#stars').innerHTML=h;}

    let TOKEN=localStorage.getItem('alpaca_token')||'';let busy=false;
    const wrap=$('#alpacaWrap'), tufts=[...document.querySelectorAll('.tuft')];
    const H=()=>TOKEN?{'X-Player-Token':TOKEN}:{};
    const api=(p,m='GET')=>fetch(p,{method:m,headers:H()});
    const apiJSON=(p,m,b)=>fetch(p,{method:m,headers:Object.assign({'Content-Type':'application/json'},H()),body:b?JSON.stringify(b):undefined});
    function gotoDist(d){apiJSON('/goto','POST',{distance_m:d}).then(r=>r.json()).then(x=>{$('#dist').textContent=x.distance_m;refresh();});}
    function renderCheckpoints(cps){
      const L=$('#cpList');L.innerHTML='';
      if(!cps.length){L.innerHTML='<div class="row empty">no spots saved yet</div>';return;}
      cps.forEach(c=>{
        const row=document.createElement('div');row.className='row';
        const nm=document.createElement('span');nm.className='nm';nm.textContent=c.name;nm.title='go to '+c.distance_m+'m';
        const go=document.createElement('button');go.className='go';go.textContent='go';
        const del=document.createElement('button');del.className='del';del.textContent='✕';
        nm.onclick=go.onclick=()=>gotoDist(c.distance_m);
        del.onclick=()=>fetch('/checkpoint/'+c.id,{method:'DELETE',headers:H()}).then(refresh);
        row.append(nm,go,del);L.appendChild(row);
      });
    }

    const ghostEls={};
    function renderGhosts(others,myDist){
      const ids=new Set(others.map(o=>o.id));
      others.forEach(o=>{
        const x=50+(o.distance_m-myDist)*0.9; // ~1m = 0.9% → on-screen window ≈ ±55m, so you stroll past them
        if(x<-8||x>108){if(ghostEls[o.id]){ghostEls[o.id].remove();delete ghostEls[o.id];}return;}
        let el=ghostEls[o.id];
        if(!el){
          el=document.createElement('div');el.className='ghost';
          el.innerHTML='<span class="tag"></span><span class="g-alpaca">🦙</span>';
          const seed=[...o.id].reduce((a,c)=>a+c.charCodeAt(0),0),d=seed%4; // stable depth per player
          el.style.bottom=(d*10)+'px';el.style.opacity=(0.5-d*0.06).toFixed(2);
          el.querySelector('.g-alpaca').style.fontSize=(54-d*6)+'px';
          $('#ghosts').appendChild(el);ghostEls[o.id]=el;
        }
        el.querySelector('.tag').textContent=o.id+' · '+o.distance_m+'m';
        el.style.left=x+'%';
      });
      Object.keys(ghostEls).forEach(id=>{if(!ids.has(id)){ghostEls[id].remove();delete ghostEls[id];}});
    }
    function renderBoard(others){
      const list=[...others].sort((a,b)=>b.distance_m-a.distance_m).slice(0,10);
      $('#boardrows').innerHTML = list.length
        ? list.map(o=>'<div class="row"><span>🦙 '+o.id+'</span><b>'+o.distance_m+'m</b></div>').join('')
        : '<div class="row" style="opacity:.5">just you out here 🌾</div>';
    }
    function render(s){
      $('#pid').textContent=s.player_id;$('#grass').textContent=s.grass_eaten;$('#dist').textContent=s.distance_m;$('#pcount').textContent=s.plants.length;
      const box=$('#plants');const have=box.querySelectorAll('span:not(.empty)').length;
      if(s.plants.length&&have!==s.plants.length){box.innerHTML='';[...s.plants].reverse().forEach(pl=>{const el=document.createElement('span');el.textContent=pl.emoji;el.title=pl.species;box.appendChild(el);});box.scrollTop=box.scrollHeight;}
      const others=s.others||[];renderGhosts(others,s.distance_m);renderBoard(others);
      renderCheckpoints(s.checkpoints||[]);
    }
    async function refresh(){const r=await api('/state');if(r.ok)render(await r.json());}
    function nom(){const n=document.createElement('div');n.className='nom';n.textContent='nom';n.style.left='calc(58% - 130px)';n.style.bottom='40%';$('#scene').appendChild(n);setTimeout(()=>n.remove(),700);}
    async function graze(){
      if(busy||!TOKEN)return;busy=true;
      wrap.classList.add('eat');const t=tufts[Math.floor(Math.random()*tufts.length)];t.classList.add('eaten');nom();
      setTimeout(()=>{wrap.classList.remove('eat');t.classList.remove('eaten');busy=false;},300);
      try{const r=await api('/eat','POST');const d=await r.json();$('#grass').textContent=d.grass_eaten;if(d.sprouting)setTimeout(refresh,700);}catch(e){busy=false;}
    }
    function startGame(){
      ['#hud','#shelf','#hint','#who','#board','#cp'].forEach(s=>$(s).classList.remove('hidden'));$('#login').classList.add('hidden');
      $('#cpAdd').onclick=()=>apiJSON('/checkpoint','POST',{}).then(refresh);
      $('#cpStart').onclick=()=>gotoDist(0);
      document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();graze();}});
      document.addEventListener('click',e=>{if(!e.target.closest('#who')&&!e.target.closest('#login'))graze();});
      setInterval(async()=>{const r=await api('/walk','POST');if(r.ok){const d=await r.json();$('#dist').textContent=d.distance_m;}},3000);
      setInterval(refresh,2500);refresh();
    }
    async function doLogin(){
      const id=$('#in-id').value.trim().toLowerCase(),pin=$('#in-pin').value.trim();$('#loginerr').textContent='';
      try{
        const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:id,pin})});
        const d=await r.json();if(!r.ok){$('#loginerr').textContent=d.detail||'try again';return;}
        TOKEN=d.token;localStorage.setItem('alpaca_token',TOKEN);localStorage.setItem('alpaca_id',d.player_id);startGame();
      }catch(e){$('#loginerr').textContent='network error';}
    }
    $('#go').addEventListener('click',doLogin);
    $('#in-pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    $('#who').addEventListener('click',()=>{localStorage.removeItem('alpaca_token');location.reload();});
    (async()=>{if(TOKEN){const r=await api('/state');if(r.ok){render(await r.json());startGame();return;}localStorage.removeItem('alpaca_token');TOKEN='';}$('#in-id').focus();})();
  </script>
</body>
</html>
